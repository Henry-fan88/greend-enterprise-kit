name: Verify Server Package

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-server-package.yml'
      - 'greend-company-server/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: greend-company-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: greend-company-server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: greend-company-server-tgz
          path: greend-company-server/*.tgz
