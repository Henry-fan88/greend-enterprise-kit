name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-desktop-installers.yml'
      - 'greend-desktop-app/**'

jobs:
  build-macos:
    runs-on: macos-14
    defaults:
      run:
        working-directory: greend-desktop-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: greend-desktop-app/package-lock.json
      - run: npm ci
      - run: npm run dist:mac:arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: greend-desktop-macos-arm64
          path: |
            greend-desktop-app/release/*.dmg
            greend-desktop-app/release/*.blockmap

  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        working-directory: greend-desktop-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: greend-desktop-app/package-lock.json
      - run: npm ci
      - run: npm run dist:win:x64
      - uses: actions/upload-artifact@v4
        with:
          name: greend-desktop-windows-x64
          path: |
            greend-desktop-app/release/*.exe
            greend-desktop-app/release/*.blockmap
